<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aileen's Home Studio| Product Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="products-data.js"></script> <style>
        /* --- 继承主页的全局轻奢商务色调 --- */
        :root {
            --primary-color: #0f172a;       
            --accent-color: #b45309;        
            --text-color: #1e293b;          
            --text-muted: #64748b;          
            --bg-light: #f8fafc;            
            --white: #ffffff;
            --border-color: #e2e8f0;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            color: var(--text-color);
            background-color: var(--white);
            line-height: 1.6;
            padding-top: 40px; /* 留出顶部间距 */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 25px;
        }

        /* 返回目录导航 */
        .back-nav {
            margin-bottom: 25px;
        }
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .back-link:hover {
            color: var(--accent-color);
        }

        /* ==========================================
           📦 上半部分：产品主图 + 基本购买信息区域
           ========================================== */
        .product-main-section {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 左右分栏 */
            gap: 50px;
            margin-bottom: 60px;
        }

        /* 📸 左侧：画廊多图切换核心样式 */
        .product-gallery {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 放大镜大图框 */
        .main-image-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            height: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden; /* 🌟 必须保留：隐藏图片放大后溢出的部分 */
            background-color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-in; /* 🌟 新增：鼠标移上去变成放大镜形状 */
        }

        .main-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 🌟 修改 transition： transform 的动画要极其丝滑，0.1s 刚好 */
            transition: transform 0.1s ease-out, border-color 0.2s ease; 
            transform-origin: center center; /* 默认形变中心点 */
        }

        /* 下方小图缩略图轨道 */
        .thumb-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .thumb-item {
            width: 80px;
            height: 80px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            overflow: hidden;
            background-color: var(--bg-light);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 🌟 当前选中的小图红框高亮（对应你截图中的红框效果） */
        .thumb-item.active {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(180, 83, 9, 0.1);
        }

        /* 📝 右侧：产品标题、编码及询盘按钮 */
        .product-meta-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-code {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        .product-title {
            font-size: 2.2rem;
            color: var(--primary-color);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        /* ⚡ 核心新增：详情页双通道询盘按钮容器 */
        .inquiry-actions-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            width: 100%;
            max-width: 450px; /* 控制双按钮总宽度，紧凑美观 */
        }

        /* 极简画册风长条按钮 */
        .inquiry-action-btn {
            flex: 1;
            padding: 15px 20px;
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Email 保持经典的暗色调作为主视觉 */
        .inquiry-action-btn.btn-email {
            background-color: var(--primary-color);
            color: var(--white);
        }
        .inquiry-action-btn.btn-email:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        /* WhatsApp 保持透明框，悬停时反转色调 */
        .inquiry-action-btn.btn-whatsapp:hover {
            background-color: var(--primary-color);
            color: var(--white);
            transform: translateY(-2px);
        }

        .inquiry-btn:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
        }


        /* ==========================================
           📄 下半部分：详细的产品信息与描述区域
           ========================================== */
        .product-details-section {
            border-top: 1px solid var(--border-color);
            padding-top: 40px;
            margin-bottom: 80px;
        }

        .tabs-header {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 25px;
        }

        .tab-btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            text-transform: uppercase;
        }

        .tab-btn.active {
            color: var(--primary-color);
        }

        /* 下划线指示器 */
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent-color);
        }

        .tab-content {
            font-size: 1.05rem;
            color: #334155;
            line-height: 1.8;
        }

        /* 参数表格样式 */
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .spec-table td {
            padding: 12px 20px;
            border: 1px solid var(--border-color);
        }

        .spec-table td:first-child {
            width: 25%;
            background-color: var(--bg-light);
            font-weight: 600;
            color: var(--primary-color);
        }

        /* 手机端响应式适配 */
        @media (max-width: 768px) {
            .product-main-section {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .main-image-box {
                height: 350px;
            }
            .product-title {
                font-size: 1.6rem;
            }

        }
        /* 鼠标悬停和点击选中的缩略图样式 */
        .thumb-item {
            cursor: pointer; /* 鼠标移上去变成可以点击的小手 */
            border: 2px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        /* 🌟 当小图被选中（active）或鼠标悬停时，自动变成你主题的黄褐色红框 */
        .thumb-item.active,
        .thumb-item:hover {
            border-color: #b45309;
            box-shadow: 0 0 0 2px rgba(180, 83, 9, 0.1);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="back-nav">
            <a href="listing.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Listing</a>
        </div>

        <div class="product-main-section">
            
            <div class="product-gallery">
                <div class="main-image-box" id="zoomContainer">
                    <img id="mainProductImg" src="images/lamp01.jpg" alt="Product Main Image">
                </div>
                <div class="thumb-list" id="thumbList">
                    <div class="thumb-item active" onclick="switchImage(this, 'images/lamp01.jpg')">
                        <img src="images/lamp01.jpg" alt="Thumb 1">
                    </div>
                    <div class="thumb-item" onclick="switchImage(this, 'images/lamp01-detail1.jpg')">
                        <img src="images/lamp01-detail1.jpg" alt="Thumb 2">
                    </div>
                    <div class="thumb-item" onclick="switchImage(this, 'images/lamp01-detail2.jpg')">
                        <img src="images/lamp01-detail2.jpg" alt="Thumb 3">
                    </div>
                    <div class="thumb-item" onclick="switchImage(this, 'images/lamp01-detail3.jpg')">
                        <img src="images/lamp01-detail3.jpg" alt="Thumb 4">
                    </div>
                </div>
            </div>

            <div class="product-meta-box">
                <div class="product-code" id="productCode">Item Code: TL-001</div>
                <h1 class="product-title" id="productTitle">Minimalist Dimmable Ceramic Table Lamp</h1>
                <div class="inquiry-actions-group">
                    <button class="inquiry-action-btn btn-email" id="inquiryEmailBtn">
                        <i class="fa-regular fa-envelope"></i> Email Inquiry
                    </button>
                    <button class="inquiry-action-btn btn-whatsapp" id="inquiryWhatsAppBtn">
                        <i class="fa-brands fa-whatsapp"></i> WhatsApp
                    </button>
                </div>
            </div>

        </div>

        <div class="product-details-section">
            <div class="tabs-header">
                <button class="tab-btn active">Product Description</button>
            </div>
            
            <div class="tab-content" id="productDescContainer">
                <table class="spec-table">
                    <tbody id="specsTableBody">
                    <tr>
                        <td id="spec-label-1">Material</td>
                        <td id="spec-value-1">Loading...</td>
                    </tr>
                    <tr>
                        <td id="spec-label-2">Light Source / Style</td>
                        <td id="spec-value-2">Loading...</td>
                    </tr>
                    <tr>
                        <td id="spec-label-3">Certification</td>
                        <td id="spec-value-3">Loading...</td>
                    </tr>
                    <tr>
                        <td id="spec-label-4">Application</td>
                        <td id="spec-value-4">Loading...</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔄 核心骨架：从数据库动态加载产品详情
        // ==========================================
        window.onload = function() {
            // 1. 获取 URL 中的产品标识 (如: product-detail.html?item=premium%20pe%20lighted%20christmas%20tree)
            const urlParams = new URLSearchParams(window.location.search);
            const productKey = urlParams.get('item') ? urlParams.get('item').toLowerCase().trim() : "";
            
            // 2. 从本地 products-data.js 的数据库里调取对应数据
            const productInfo = detailsDatabase[productKey];

            if (productInfo) {
                // 渲染产品页面大标题
                document.getElementById('productTitle').innerText = productKey.toUpperCase();
                // 渲染产品编号
                document.getElementById('productCode').innerText = productInfo.code;

                // 🌟 ✨ 【图片连通核心】：动态加载主图与多张缩略图
                if (productInfo.images && productInfo.images.length > 0) {
                    // 将数据库里的第一张图设置为默认显示的大图
                    document.getElementById('mainProductImg').src = productInfo.images[0];

                    // 动态生成下方的小图切换轨道
                    let thumbHtml = "";
                    productInfo.images.forEach((imgUrl, index) => {
                        // 第一张默认加上 active 类名（红框高亮）
                        const activeClass = index === 0 ? "thumb-item active" : "thumb-item";
                        thumbHtml += `
                            <div class="${activeClass}" onclick="switchImage(this, '${imgUrl}')">
                                <img src="${imgUrl}" alt="Thumbnail ${index + 1}">
                            </div>
                        `;
                    });
                    document.getElementById('thumbList').innerHTML = thumbHtml;
                } else {
                    // 如果数据库里没配图片，显示一个占位图
                    document.getElementById('mainProductImg').src = "images/placeholder.jpg";
                    document.getElementById('thumbList').innerHTML = "";
                }

                // 3. 动态渲染产品参数表格 (Specs Table)
                let specsHtml = "";
                if (productInfo.specs && productInfo.specs.length > 0) {
                    productInfo.specs.forEach(spec => {
                        specsHtml += `
                            <tr>
                                <td class="spec-label">${spec.label}</td>
                                <td class="spec-value">${spec.value}</td>
                            </tr>
                        `;
                    });
                } else {
                    specsHtml = `<tr><td colspan="2" style="text-align:center; color:var(--text-muted);">Custom specifications available upon request.</td></tr>`;
                }
                document.getElementById('specsTableBody').innerHTML = specsHtml;

                // 4. 面包屑导航同步更新 (Home / Catalogue / 当前产品名)
                const breadcrumbCurrent = document.getElementById('breadcrumb-current');
                if (breadcrumbCurrent) {
                    breadcrumbCurrent.innerText = productKey.toUpperCase();
                }

            } else {
                // 💥 容错处理：如果数据库找不到该产品，贴心提示
                document.getElementById('productTitle').innerText = "Product Not Found";
                document.getElementById('productCode').innerText = "Item Code: Unknown";
                document.getElementById('mainProductImg').src = "images/placeholder.jpg";
                document.getElementById('thumbList').innerHTML = "";
                document.getElementById('specsTableBody').innerHTML = `<tr><td colspan="2" style="text-align:center; color:red;">Please check if this product is registered in products-data.js.</td></tr>`;
            }

            // ==========================================
            // 📞 点击询盘按钮自动提取信息（邮件/WhatsApp）
            // ==========================================
            const emailBtn = document.getElementById('inquiryEmailBtn');
            const whatsappBtn = document.getElementById('inquiryWhatsAppBtn');

            const currentItemCode = productInfo ? productInfo.code : "Unknown Code";
            const cleanName = productKey ? productKey.toUpperCase() : "Inquiry Product";

            if (emailBtn) {
                emailBtn.onclick = function() {
                    const mailtoUrl = `mailto:aileen@yourdomain.com?subject=Inquiry about ${encodeURIComponent(cleanName)} (${currentItemCode})&body=Hi Aileen,%0D%0A%0D%0AI am interested in your product: ${encodeURIComponent(cleanName)} (${currentItemCode}).%0D%0APlease send me more details, including a wholesale catalog and MOQ options.%0D%0A%0D%0AThanks!`;
                    window.location.href = mailtoUrl;
                };
            }

            if (whatsappBtn) {
                whatsappBtn.onclick = function() {
                    const whatsappText = encodeURIComponent(`Hi Aileen, I am browsing your website and interested in your product: "${cleanName}" (${currentItemCode}). Can we discuss the custom options and wholesale catalog via WhatsApp?`);
                    window.open(`https://wa.me/8618894695487?text=${whatsappText}`, '_blank');
                };
            }

            // ==========================================
            // ✨ 高档全自动鼠标悬停放大镜逻辑
            // ==========================================
            const zoomContainer = document.getElementById('zoomContainer');
            const zoomImage = document.getElementById('mainProductImg');

            if (zoomContainer && zoomImage) {
                // 1. 鼠标移入：图片放大 2 倍
                zoomContainer.addEventListener('mouseenter', () => {
                    zoomImage.style.transform = 'scale(2)';
                });

                // 2. 鼠标移动：计算坐标，让放大中心点跟着鼠标走
                zoomContainer.addEventListener('mousemove', (e) => {
                    const rect = zoomContainer.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    zoomImage.style.transformOrigin = `${x}% ${y}%`;
                });

                // 3. 鼠标移出：恢复原样
                zoomContainer.addEventListener('mouseleave', () => {
                    zoomImage.style.transform = 'scale(1)';
                    zoomImage.style.transformOrigin = 'center center';
                });
            }
        };

        // ==========================================
        // 📸 缩略图点击切换函数（必须放在 window.onload 外面，供全局调用）
        // ==========================================
        function switchImage(element, imageUrl) {
            // 1. 切换大图显示的路径
            document.getElementById('mainProductImg').src = imageUrl;
            
            // 2. 移除其他所有缩略图的高亮边框，只给当前点击的图加上
            const thumbs = document.querySelectorAll('.thumb-item');
            thumbs.forEach(t => t.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
