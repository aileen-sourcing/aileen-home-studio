<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aileen's Home Studio | Product Showcase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="products-data.js"></script>
    <style>
        /* --- 极简轻奢画册风格 --- */
        :root {
            --primary-color: #0f172a;
            --accent-color: #b45309;
            --text-color: #111827;
            --text-muted: #6b7280;
            --bg-light: #f9fafb;
            --white: #ffffff;
            --border-color: #e5e7eb;
            --footer-bg: #0f172a;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { color: var(--text-color); background: var(--white); padding-top: 65px; }
        a { text-decoration: none; color: inherit; }

        /* 顶部导航 */
        header { position: fixed; top: 0; left: 0; width: 100%; background: var(--white); border-bottom: 1px solid var(--border-color); z-index: 1000; height: 65px; display: flex; align-items: center; }
        .navbar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 40px; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); letter-spacing: 1.5px; }
        .back-btn { font-weight: 700; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; transition: var(--transition); }
        .back-btn:hover { color: var(--accent-color); }

        /* 面包屑 */
        .breadcrumb { padding: 20px 40px; max-width: 1400px; margin: 0 auto; font-size: 0.8rem; color: var(--text-muted); }
        .breadcrumb span { font-weight: 700; color: var(--primary-color); }

        /* 主体布局 */
        .listing-container { max-width: 1400px; margin: 10px auto 60px auto; padding: 0 40px; }
        
        /* 列表头部声明 */
        .listing-header { margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .listing-title { font-size: 2.2rem; font-weight: 500; color: var(--primary-color); text-transform: capitalize; }
        .listing-subtitle { font-size: 0.95rem; color: var(--text-muted); margin-top: 5px; }

        /* ⚡ 核心新增：列表页询盘双通道按钮布局与极简风格 */
        .inquiry-actions-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            width: 100%;
        }
        .inquiry-action-btn {
            flex: 1;
            padding: 10px 5px;
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 2px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .inquiry-action-btn:hover {
            background: var(--primary-color);
            color: var(--white);
        }

        /* 多卡片产品网格 - 自动并排 */
        .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px 24px; }
        
        .product-card { background: transparent; display: flex; flex-direction: column; transition: var(--transition); cursor: pointer; }
        .product-img-box { height: 280px; background: var(--bg-light); display: flex; align-items: center; justify-content: center; color: #94a3b8; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; border: 1px solid #f3f4f6; transition: var(--transition); position: relative; }
        .product-card:hover .product-img-box { border-color: var(--primary-color); }
        
        .product-info { padding: 15px 0 0 0; display: flex; flex-direction: column; gap: 8px; }
        .product-name { font-size: 0.95rem; font-weight: 500; color: var(--primary-color); line-height: 1.4; min-height: 40px; }
        .inquiry-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-radius: 2px; cursor: pointer; transition: var(--transition); }
        .product-card:hover .inquiry-btn { background: var(--primary-color); color: var(--white); }

        @media (max-width: 1200px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 20px 15px; }
            .listing-container { padding: 0 20px; }
        }
        footer { 
            background: var(--footer-bg); 
            color: #64748b; 
            text-align: center; 
            padding: 25px; 
            font-size: 0.8rem; 
            border-top: 1px solid #1e293b; 
            margin-top: 80px; 
        }

        .product-image-wrapper {
            height: 280px !important;   /* 高度死死卡在 280px */
            background: var(--bg-light);
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .product-image {
            max-width: 90% !important;  /* 左右留出呼吸感 */
            max-height: 90% !important; /* 上下不顶头 */
            width: auto !important;     /* 保持 1:1 比例不拉伸 */
            height: auto !important;    /* 保持 1:1 比例不拉伸 */
            object-fit: contain !important;
        }

    </style>
</head>
<body>

    <header>
        <div class="navbar">
            <a href="index.html" class="logo">Aileen's Home Studio</a>
            <a href="javascript:history.back();" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
        </div>
    </header>

    <div class="breadcrumb">
        <a href="index.html">Home</a> / <a href="javascript:history.back();">Catalog</a> / <span id="br-current">List</span>
    </div>

    <div class="listing-container">
        <div class="listing-header">
            <h1 class="listing-title" id="listing-main-title">Products List</h1>
            <p class="listing-subtitle" id="listing-desc">Discover our premium wholesale selections.</p>
        </div>

        <div class="products-grid" id="listing-grid-container"></div>
    </div>

    <footer>
        <p>&copy; 2026 Aileen's Home Studio Global Sourcing. All Rights Reserved.</p>
    </footer>

    <script>
        // ==========================================
        // 🔄 智能骨架：动态渲染产品列表页（全链路打通）
        // ==========================================
        function renderListingPage() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 1. 获取大类和子类参数，并统一转成小写、去除空格
            let catItem = urlParams.get('cat') ? urlParams.get('cat').toLowerCase().trim() : "";
            let subItem = urlParams.get('sub') ? urlParams.get('sub').toLowerCase().trim() : "";

            // 🌟 智能兼容处理：如果导航栏传来的是 "holiday"，自动兼容你数据库里的 "holiday decor"
            if (catItem === "holiday") {
                catItem = "holiday decor";
            }

            // 2. 动态格式化页面大标题（把 christmas-decor 变成 Christmas Decor）
            const formattedTitle = subItem
                .split('-')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
            
            const pageTitleEl = document.getElementById('pageTitle');
            if (pageTitleEl) {
                pageTitleEl.innerText = formattedTitle || "Products";
            }
            const breadcrumbSubEl = document.getElementById('breadcrumb-sub');
            if (breadcrumbSubEl) {
                breadcrumbSubEl.innerText = formattedTitle || "Products";
            }

            let gridHtml = "";

            // 3. 遍历数据库，进行双重精准筛选
            for (const productName in detailsDatabase) {
                if (detailsDatabase.hasOwnProperty(productName)) {
                    const product = detailsDatabase[productName];
                    
                    const dbCategory = product.category ? product.category.toLowerCase().trim() : "";
                    const dbSubcategory = product.subcategory ? product.subcategory.toLowerCase().trim() : "";

                    // 核心匹配：大类和子类必须完全吻合
                    if (dbCategory === catItem && dbSubcategory === subItem) {
                        
                        // 🌟 ✨【图片修复核心】：因为数据库里是 images 数组，所以取第一张图 images[0] 作为封面
                        const coverImage = (product.images && product.images.length > 0) ? product.images[0] : "images/placeholder.jpg";
                        const currentCode = product.code || "Item Code: N/A";

                        // 询盘链接
                        const mailtoUrl = `mailto:aileen@yourdomain.com?subject=Inquiry: ${encodeURIComponent(productName.toUpperCase())}&body=Hi Aileen, I want to know more about ${encodeURIComponent(productName.toUpperCase())} (${currentCode}).`;
                        const whatsappUrl = `https://wa.me/8618894695487?text=${encodeURIComponent('Hi Aileen, I am interested in: ' + productName.toUpperCase() + ' (' + currentCode + ')')}`;

                        gridHtml += `
                            <div class="product-card">
                                <div class="product-image-wrapper" onclick="window.location.href='product-detail.html?item=${encodeURIComponent(productName)}'">
                                    <img src="${coverImage}" alt="${productName}" class="product-image">
                                </div>
                                <div class="product-info">
                                    <h3 class="product-name" onclick="window.location.href='product-detail.html?item=${encodeURIComponent(productName)}'">
                                        ${productName.toUpperCase()}
                                    </h3>
                                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:10px;">${currentCode}</p>
                                    <div class="inquiry-actions-group">
                                        <button class="inquiry-action-btn" onclick="window.location.href='${mailtoUrl}'">
                                            <i class="fa-regular fa-envelope"></i> Email
                                        </button>
                                        <button class="inquiry-action-btn" onclick="window.open('${whatsappUrl}', '_blank')">
                                            <i class="fa-brands fa-whatsapp"></i> WhatsApp
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }
            }

            // 4. 如果没找到产品，给予友好提示
            if (gridHtml === "") {
                gridHtml = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 50px 0;">
                                <p>New products for "${formattedTitle}" are coming soon...</p>
                                <p style="font-size:0.85rem; margin-top:10px;">(Please check if category is "${catItem}" and subcategory is "${subItem}" in products-data.js)</p>
                            </div>`;
            }

            document.getElementById('listing-grid-container').innerHTML = gridHtml;
        }

        window.onload = renderListingPage;
    </script>
</body>
</html>
